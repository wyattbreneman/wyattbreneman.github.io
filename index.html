<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bus Stop Accessibility Analysis</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <style>
    body { margin:0; padding:0; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      z-index: 2;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 14px;
    }

    #legend {
      position: absolute;
      bottom: 30px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 13px;
      z-index: 2;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      margin-right: 6px;
      border: 1px solid #333;
    }
  </style>
</head>

<body>

<div id="menu">
  <strong>Toggle Layers:</strong><br>
  <input type="checkbox" id="toggle-routes" checked> Bus Routes<br>
  <input type="checkbox" id="toggle-buffers" checked> Walking Buffers<br>
  <input type="checkbox" id="toggle-stops" checked> Bus Stops<br>
</div>

<div id="map"></div>
<div id="legend"><strong>Bus Stop Accessibility</strong></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoid3lhdHRicmVuZW1hbiIsImEiOiJjbWxjc2Uxc3IxM3FlM2VxMzlpajVtaDhzIn0.QEwP5Qmy66LyhPD-heJWug';

Promise.all([
  fetch('Boundary.geojson').then(r=>r.json()),
  fetch('bus_stops.geojson').then(r=>r.json()),
  fetch('Bus_Routes.geojson').then(r=>r.json())
]).then(([boundary, busStops, busRoutes]) => {

  // ===============================
  // 🔥 SPATIAL JOIN (KEY FIX)
  // ===============================
  busStops.features.forEach(f => {
    f.properties.ROUTES = [];
  });

  busStops.features.forEach(stop => {
    const stopPoint = turf.point(stop.geometry.coordinates);

    busRoutes.features.forEach(route => {
      const snapped = turf.nearestPointOnLine(route, stopPoint, { units: 'kilometers' });
      const dist = snapped.properties.dist;

      // 50 meters threshold
      if (dist <= 0.05) {
        const routeName = route.properties.RTE_NO || "Unknown";

        if (!stop.properties.ROUTES.includes(routeName)) {
          stop.properties.ROUTES.push(routeName);
        }
      }
    });
  });

  // Keep for styling ONLY
  busStops.features.forEach(f => {
    f.properties.NUM_ROUTES = f.properties.ROUTES.length;
  });

  // ===============================
  // Map Bounds
  // ===============================
  const bounds = new mapboxgl.LngLatBounds();
  boundary.features.forEach(f=>{
    if(f.geometry.type==='Polygon') f.geometry.coordinates[0].forEach(c=>bounds.extend(c));
    else if(f.geometry.type==='MultiPolygon') f.geometry.coordinates.forEach(p=>p[0].forEach(c=>bounds.extend(c)));
  });

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v11',
    bounds: bounds,
    fitBoundsOptions: { padding: 20 }
  });

  map.addControl(new mapboxgl.NavigationControl());

  map.on('load', () => {

    // ===============================
    // Boundary
    // ===============================
    map.addSource('boundary', { type:'geojson', data: boundary });
    map.addLayer({
      id:'boundary-fill',
      type:'fill',
      source:'boundary',
      paint:{'fill-color':'#000','fill-opacity':0.08}
    });
    map.addLayer({
      id:'boundary-outline',
      type:'line',
      source:'boundary',
      paint:{'line-color':'#333','line-width':1.5}
    });

    // ===============================
    // Bus Routes
    // ===============================
    map.addSource('bus-routes', { type:'geojson', data: busRoutes });
    map.addLayer({
      id:'bus-routes-layer',
      type:'line',
      source:'bus-routes',
      paint:{
        'line-color':'#ff6600',
        'line-width':2,
        'line-opacity':0.8
      }
    });

    // ✅ FIXED ROUTE POPUP
    map.on('click','bus-routes-layer', e => {
      const routeName = e.features[0].properties.RTE_NO || "Unknown";

      new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`<strong>Route: ${routeName}</strong>`)
        .addTo(map);
    });

    // ===============================
    // Buffers (400m)
    // ===============================
    const buffer = turf.buffer(busStops, 0.4, { units: 'kilometers' });

    map.addSource('bus-buffers', { type:'geojson', data: buffer });
    map.addLayer({
      id:'bus-buffers-layer',
      type:'fill',
      source:'bus-buffers',
      paint:{
        'fill-color':'#007cbf',
        'fill-opacity':0.1
      }
    });

    // ===============================
    // Bus Stops
    // ===============================
    map.addSource('bus-stops', { type:'geojson', data: busStops });
    map.addLayer({
      id:'bus-stops-layer',
      type:'circle',
      source:'bus-stops',
      paint:{
        'circle-radius':[
          'interpolate',['linear'],['get','NUM_ROUTES'],
          0,4, 1,6, 3,10, 5,15, 8,20
        ],
        'circle-color':[
          'interpolate',['linear'],['get','NUM_ROUTES'],
          0,'#ffcccc',
          1,'#ff7f7f',
          3,'#ffb74d',
          5,'#81c784',
          8,'#388e3c'
        ],
        'circle-stroke-color':'#fff',
        'circle-stroke-width':1
      }
    });

    // ✅ CLEAN POPUP WITH ROUTES
    map.on('click','bus-stops-layer', e => {
      const props = e.features[0].properties;

      const routeList = props.ROUTES && props.ROUTES.length
        ? props.ROUTES.sort((a,b)=>a-b).join(', ')
        : 'No routes nearby';

      new mapboxgl.Popup()
        .setLngLat(e.features[0].geometry.coordinates)
        .setHTML(`
          <div style="font-size:14px; line-height:1.4">
            <strong>${props.ON_STREET} & ${props.AT_STREET}</strong><br><br>

            <b>Stop ID:</b> ${props.OCTA_ID}<br>
            <b>Direction:</b> ${props.DIR}<br>
            <b>Routes:</b> ${routeList}<br><br>

            <b>Walking Buffer:</b> 400 meters (5 minute walk)
          </div>
        `)
        .addTo(map);
    });

    // Hover cursor
    map.on('mouseenter', 'bus-stops-layer', () => {
      map.getCanvas().style.cursor = 'pointer';
    });
    map.on('mouseleave', 'bus-stops-layer', () => {
      map.getCanvas().style.cursor = '';
    });

    // ===============================
    // Toggles
    // ===============================
    document.getElementById('toggle-routes').addEventListener('change', e=>{
      map.setLayoutProperty('bus-routes-layer','visibility', e.target.checked?'visible':'none');
    });

    document.getElementById('toggle-buffers').addEventListener('change', e=>{
      map.setLayoutProperty('bus-buffers-layer','visibility', e.target.checked?'visible':'none');
    });

    document.getElementById('toggle-stops').addEventListener('change', e=>{
      map.setLayoutProperty('bus-stops-layer','visibility', e.target.checked?'visible':'none');
    });

    // ===============================
    // Legend
    // ===============================
    const legendEl = document.getElementById('legend');
    legendEl.innerHTML = '<strong>Bus Stop Accessibility</strong><br>';

    const labels = [
      'No service',
      'Low access',
      'Moderate access',
      'High access',
      'Very high access'
    ];

    const colors = ['#ffcccc','#ff7f7f','#ffb74d','#81c784','#388e3c'];
    const sizes = [4,6,10,15,20];

    labels.forEach((label,i)=>{
      const div = document.createElement('div');
      div.className='legend-item';
      div.innerHTML = `
        <div class="legend-color"
          style="background:${colors[i]};
                 width:${sizes[i]}px;
                 height:${sizes[i]}px;">
        </div>
        ${label}
      `;
      legendEl.appendChild(div);
    });

  });
});
</script>

</body>
</html>
